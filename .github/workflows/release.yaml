name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Build and upload time-picker-card.js
    runs-on: ubuntu-latest
    permissions:
      contents: write # nötig, um das Asset ans Release anzuhängen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (lint + bundle)
        run: npm run build

      - name: Test
        run: npm test

      - name: Upload time-picker-card.js to release
        run: gh release upload "${{ github.event.release.tag_name }}" dist/time-picker-card.js --clobber
        env:
          GH_TOKEN: ${{ github.token }}
